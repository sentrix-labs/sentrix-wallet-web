server {
    listen 80;
    server_name wallet.sentriscloud.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name wallet.sentriscloud.com;

    ssl_certificate /etc/letsencrypt/live/wallet.sentriscloud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wallet.sentriscloud.com/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 80;
    server_name api.sentriscloud.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.sentriscloud.com;

    ssl_certificate /etc/letsencrypt/live/api.sentriscloud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sentriscloud.com/privkey.pem;

    location / {
        proxy_pass http://localhost:8545;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
